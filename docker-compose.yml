services:
  # ========== 🗄️ MySQL 数据库 ==========
  db:
    image: mysql:8.0
    container_name: miroku-mysql
    restart: unless-stopped

    # 环境变量（值会从 .env 文件自动注入）
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai  # 数据库时区对齐

    # 端口映射（本地开发时可访问，生产环境建议注释掉或改端口）
    ports:
      - "3306:3306"

    # 数据持久化（容器删了数据也不丢！）
    volumes:
      - mysql-data:/var/lib/mysql
      # 可选：自定义 MySQL 配置
      # - ./mysql/conf.d:/etc/mysql/conf.d

    # 健康检查（确保数据库完全就绪再让应用连接）
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    # 网络配置
    networks:
      - miroku-network

    # 日志配置（可选，防止日志爆盘）
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # ========== 🚀 Spring Boot 服务 ==========
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miroku-api
    restart: unless-stopped

    # 端口映射（外部访问你的服务）
    ports:
      - "8080:8080"

    # 环境变量（覆盖 Dockerfile 的默认值，.env 自动注入）
    environment:
      # 🗄️ 数据库连接（关键：DB_HOST=db，Docker 内部服务名解析）
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      # 🤖 AI 模型 API Key（透传给 Spring Boot）
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}

      # ⚙️ 系统配置
      TZ: Asia/Shanghai
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}  # 如果 .env 没配，用默认值

    # 依赖关系（等 MySQL 健康检查通过再启动 app）
    depends_on:
      db:
        condition: service_healthy

    # 网络配置（和 db 在同一网络，才能通过服务名互访）
    networks:
      - miroku-network

    # 健康检查（可选，需引入 spring-boot-starter-actuator）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s  # 给 Flyway 建表留足时间

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

# ========== 📦 数据卷声明 ==========
volumes:
  mysql-data:
    driver: local  # 本地存储，生产环境可改 nfs/ceph 等

# ========== 🌐 网络声明 ==========
networks:
  miroku-network:
    driver: bridge  # 默认桥接网络，容器间可通过服务名互访